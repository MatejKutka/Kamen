<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="profile.css">
</head>

<body>

    <main>
        <section class="profile-card" aria-labelledby="profile-heading">

            <header class="profile-card-header">
                <img src="src/profile.jpg" alt="Profilová fotka" class="avatar">
                <div class="profile-info">
                    <h1 id="profile-heading">Your name</h1>
                    <p>yourname@gmail.com</p>
                </div>
                <a href="login.html" class="btn-logout">Log out</a>
            </header>

            <hr>

            <form action="#" method="post" novalidate>
                <fieldset>

                    <div class="form-row">
                        <label for="first-name">First name</label>
                        <input type="text" id="first-name" name="first_name" placeholder="Your first name">
                    </div>

                    <div class="form-row">
                        <label for="last-name">Last name</label>
                        <input type="text" id="last-name" name="last_name" placeholder="Your last name">
                    </div>

                    <div class="form-row">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="yourname@gmail.com">
                    </div>

                    <div class="form-row">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="password">
                    </div>

                    <div class="form-row">
                        <label for="phone">Phone number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+421 900 000 000">
                    </div>

                </fieldset>

                <div class="form-actions">
                    <button type="submit" class="btn-save">Save changes</button>
                </div>
            </form>

        </section>
    </main>
</body>

</html>
