<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prihlásenie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />
</head>
<body>

    <header>
        <a href="homepage.html">
            <img src="src/Logo.png" alt="Logo firmy" />
        </a>
    </header>

    <main>

        <section class="intro-text">
            <h2>Prebuďte svoj potenciál</h2>
            <p>Špičkové športové oblečenie pre každý tréning, každý beh, každé víťazstvo.</p>
        </section>

        <article>

            <nav>
                <a href="homepage.html">&larr; back to website</a>
            </nav>

            <h1>Login</h1>

            <form action="#" method="post">

                <section class="field-group mb-3">
                    <label for="email" class="form-label fw-bold">Email</label>
                    <input type="email" id="email" name="email" placeholder="input your email"
                           class="form-control rounded-pill" />
                </section>

                <section class="field-group mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" id="password" name="password" placeholder="input your password"
                           class="form-control rounded-pill" />
                </section>

                <a href="homepage.html" class="btn btn-secondary rounded-pill w-100 mt-3 fw-bold">Login</a>

            </form>

        </article>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
