<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prihlásenie</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>

    <header>
        <a href="homepage.html">
            <img src="src/Logo.png" alt="Logo firmy" />
        </a>
    </header>

    <main>

        <section class="intro-text">
            <h2>Prebuďte svoj potenciál</h2>
            <p>Špičkové športové oblečenie pre každý tréning, každý beh, každé víťazstvo.</p>
        </section>

        <article>

            <nav>
                <a href="homepage.html">&larr; back to website</a>
            </nav>

            <h1>Login</h1>

            <form action="#" method="post">

                <section class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="input your email" />
                </section>

                <section class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="input your password" />
                </section>

                <a href="homepage.html" class="btn-login">Login</a>

            </form>

        </article>

    </main>

</body>
</html>
