<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prihlásenie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <main>
        <article aria-labelledby="login-heading">

            <div class="login-avatar">
                <img src="src/profile.jpg" alt="Avatar">
            </div>

            <h1 id="login-heading">Login</h1>

            <form action="#" method="post">

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="yourname@gmail.com">
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="password">
                </div>

                <a href="homepage.html" class="btn-login">Login</a>

            </form>

            <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>
        </article>
    </main>

</body>

</html>
