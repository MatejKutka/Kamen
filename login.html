<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prihlásenie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="footer.css">
</head>

<body>

    <header class="site-header">
        <nav class="navbar" aria-label="Hlavná navigácia">

            <a class="navbar-logo" href="homepage.html" aria-label="Go to the home page">
                <img src="src/Logo.png" alt="Logo obchodu">
            </a>

            <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
            <label for="nav-toggle" class="nav-toggle-label" aria-label="Open menu">
                <span></span><span></span><span></span>
            </label>

            <div class="navbar-collapse">
                <ul class="navbar-links" role="list">
                    <li><a href="homepage.html" class="navbar-link">Home</a></li>
                    <li><a href="homepage.html#sports" class="navbar-link">Sports</a></li>
                    <li><a href="#" class="navbar-link">Men</a></li>
                    <li><a href="#" class="navbar-link">Women</a></li>
                    <li><a href="#" class="navbar-link">Children</a></li>
                </ul>

                <search class="navbar-search" role="search">
                    <img src="src/magnifying-glass.png" alt="" class="navbar-search-icon" aria-hidden="true">
                    <input type="search" id="site-search" class="navbar-search-input" placeholder="Search">
                </search>

                <div class="navbar-actions">
                    <a href="register.html" class="btn-signup">Sign Up</a>
                    <a href="profile.html" class="navbar-icon-btn" aria-label="My profile">
                        <img src="src/profile.jpg" alt="" aria-hidden="true">
                    </a>
                    <a href="cart.html" class="navbar-icon-btn" aria-label="Shopping cart">
                        <img src="src/shoping-cart.png" alt="" aria-hidden="true">
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <article aria-labelledby="login-heading">

            <div class="login-avatar">
                <img src="src/profile.jpg" alt="Avatar">
            </div>

            <h1 id="login-heading">Login</h1>

            <form action="#" method="post">

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="yourname@gmail.com">
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="password">
                </div>

                <a href="homepage.html" class="btn-login">Login</a>

            </form>

            <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>
        </article>
    </main>

    <footer class="footer-section">
        <div class="footer-container">
            <div class="footer-left">
                <h4>Kamen</h4>
                <p>Small company description</p>
            </div>
            <div class="footer-right">
                <p><strong>Contact us</strong></p>
                <p>Mail - kamen@gmail.com</p>
                <p>Phone - +421 xxx xxx xxx</p>
            </div>
        </div>
    </footer>

</body>

</html>
