<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrácia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="register.css" />
</head>
<body>

    <header>
        <a href="homepage.html">
            <img src="src/Logo.png" alt="Logo firmy" />
        </a>
    </header>

    <main>

        <section class="intro-text">
            <h2>Nakupuj bez obmedzení</h2>
            <p>Vytvor si účet a nakupuj rýchlejšie, pohodlnejšie a s prehľadom o objednávkach.</p>
        </section>

        <article>

            <nav>
                <a href="homepage.html">&larr; späť na domovskú stránku</a>
            </nav>

            <h1>Registrácia</h1>

            <form action="#" method="post">

                <section class="field-group mb-3">
                    <label for="name" class="form-label fw-bold">Meno</label>
                    <input type="text" id="name" name="name" placeholder="Zadaj meno"
                           class="form-control rounded-pill" />
                </section>

                <section class="field-group mb-3">
                    <label for="email" class="form-label fw-bold">Email</label>
                    <input type="email" id="email" name="email" placeholder="Zadaj email"
                           class="form-control rounded-pill" />
                </section>

                <section class="field-group mb-3">
                    <label for="password" class="form-label fw-bold">Heslo</label>
                    <input type="password" id="password" name="password" placeholder="Zadaj heslo"
                           class="form-control rounded-pill" />
                </section>

                <section class="field-group mb-3">
                    <label for="confirm-password" class="form-label fw-bold">Potvrď heslo</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Potvrď heslo"
                           class="form-control rounded-pill" />
                </section>

                <a href="homepage.html" class="btn btn-dark rounded-pill w-100 mt-3 fw-bold">Zaregistruj sa</a>

                <p class="switch-link mt-3 text-center">
                   Už máš účet?
                    <a href="login.html">Prihlásiť sa</a>
                </p>

            </form>

        </article>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
