<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrácia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="register.css">
</head>

<body>

    <main>
        <article aria-labelledby="register-heading">
            <a href="homepage.html" class="btn-home">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" />
                    <polyline points="9 21 9 12 15 12 15 21" />
                </svg>
                Home
            </a>
            <div class="login-avatar">
                <img src="src/profile.jpg" alt="Avatar">
            </div>

            <h1 id="register-heading">Register</h1>

            <form action="#" method="post">

                <div class="field-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name">
                </div>

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="yourname@gmail.com">
                </div>

                <div class="field-group">
                    <label for="password">password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                </div>

                <div class="field-group">
                    <label for="confirm-password">Confirm password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••">
                </div>

                <a href="homepage.html" class="btn-register">Sign up</a>

            </form>

            <p class="switch-link">Do you already have an account? <a href="login.html">Log in</a></p>
        </article>
    </main>
</body>

</html>
